<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 论文库</title>

    <link rel="stylesheet" href="src/css/base.css">
    <link rel="stylesheet" href="src/css/layout.css">
    <link rel="stylesheet" href="src/css/header.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--card-bg, #fff);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary-color, #2563eb);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: var(--text-color, #333);
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border-color, #ddd);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color, #2563eb);
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color, #2563eb);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .login-btn:hover {
            opacity: 0.92;
        }
        .login-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .error-message {
            color: #dc2626;
            margin-top: 0.75rem;
            text-align: center;
            min-height: 1.25rem;
        }
        .form-toggle {
            margin-top: 1.25rem;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
        .form-toggle a {
            color: var(--primary-color, #2563eb);
            cursor: pointer;
            text-decoration: underline;
        }
        .login-note {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
            text-align: center;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-text">
            <h1>论文库</h1>
            <p>研究文献档案 — 搜索、浏览与导出</p>
        </div>
    </div>

    <div class="login-container">
        <!-- Login Form -->
        <div id="loginSection">
            <h1>登录</h1>
            <div class="login-note">
                请使用公司开机账号密码登入论文库
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" name="username" required autofocus autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" name="password" required autocomplete="current-password" placeholder="请输入密码">
                </div>
                <button type="submit" class="login-btn" id="loginSubmitBtn">登录</button>
                <div class="error-message" id="loginErrorMessage"></div>
            </form>

        </div>


    </div>

    <script type="module">
        import { login } from './src/js/auth.js';

        const urlParams = new URLSearchParams(window.location.search);
        const next = urlParams.get('next');

        // Login handler
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginErrorMessage');
        const loginBtn = document.getElementById('loginSubmitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.textContent = '';
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const data = await login(username, password);
                if (!data.user) {
                    throw new Error('登录失败');
                }
                if (next) {
                    window.location.href = next;
                } else if (data.user.is_admin) {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                loginError.textContent = err.message || '登录失败';
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

    </script>
</body>
</html>
