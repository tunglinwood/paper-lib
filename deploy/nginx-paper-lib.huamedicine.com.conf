# Nginx configuration for Paper Library
# Domain: paper-lib.huamedicine.com
# Serves static files directly and proxies API requests to the backend.

# ─────────────────────────────────────────────
# Upstream: Backend API server
# ─────────────────────────────────────────────
upstream paper_lib_backend {
    server 10.8.8.28:9000;
}

# ─────────────────────────────────────────────
# HTTP → HTTPS redirect
# ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name paper-lib.huamedicine.com;
    return 301 https://$server_name$request_uri;
}

# ─────────────────────────────────────────────
# HTTPS server
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name paper-lib.huamedicine.com;

    # ─── SSL Certificates ───
    ssl_certificate /etc/nginx/ssl/paper-lib.huamedicine.com.pem;
    ssl_certificate_key /etc/nginx/ssl/paper-lib.huamedicine.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── Document root ───
    root /var/www/paper-lib;
    index index.html;

    # ─── Logging ───
    access_log /var/log/nginx/paper-lib-access.log;
    error_log /var/log/nginx/paper-lib-error.log;

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip compression ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml font/woff font/woff2;
    gzip_min_length 1000;
    gzip_vary on;

    # ─── API proxy ───
    location /api/ {
        proxy_pass http://paper_lib_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 200M;
    }

    # ─── Paper HTML files proxy ───
    location /papers/ {
        proxy_pass http://paper_lib_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Archive/PDF proxy ───
    location /archive/ {
        proxy_pass http://paper_lib_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Static assets (long cache) ───
    location /src/ {
        # Versioned JS/CSS imports handle caching; allow short revalidation during active development
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ─── HTML entry points ───
    location = / {
        try_files /index.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location = /admin {
        try_files /admin.html =404;
    }

    location = /embed {
        try_files /embed.html =404;
    }

    # ─── Fallback for SPA paths ───
    location / {
        try_files $uri $uri/ /index.html;
    }
}
