# Nginx configuration for Paper Library frontend
# Serves static files and proxies API requests to backend
#
# Installation:
#   sudo cp deploy/nginx-frontend.conf /etc/nginx/sites-available/paper-lib
#   sudo ln -s /etc/nginx/sites-available/paper-lib /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ─────────────────────────────────────────────
# Upstream: Backend API server
# ─────────────────────────────────────────────
# Change this to your backend server address
upstream paper_lib_backend {
    server 127.0.0.1:9000;  # ← CHANGE: backend IP or hostname

    # For remote backend with load balancing:
    # server backend1.example.com:9000;
    # server backend2.example.com:9000;
}

# ─────────────────────────────────────────────
# HTTP → HTTPS redirect (optional, recommended for production)
# ─────────────────────────────────────────────
# server {
#     listen 80;
#     server_name papers.example.com;
#     return 301 https://$server_name$request_uri;
# }

# ─────────────────────────────────────────────
# Main server block
# ─────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;  # ← Uncomment for HTTPS
    server_name papers.example.com;  # ← CHANGE: your domain

    # ─── SSL Configuration (for HTTPS) ───
    # ssl_certificate /etc/letsencrypt/live/papers.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/papers.example.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # ─── Document root ───
    root /var/www/paper-lib;
    index index.html;

    # ─── Logging ───
    access_log /var/log/nginx/paper-lib-access.log;
    error_log /var/log/nginx/paper-lib-error.log;

    # ─── Gzip compression ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Static assets (long cache) ───
    location /src/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Paper HTML files ───
    # Option 1: Serve locally (if synced from backend)
    location /papers/ {
        alias /var/www/paper-lib/papers/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Option 2: Proxy to backend (if not synced)
    # location /papers/ {
    #     proxy_pass http://paper_lib_backend;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     expires 30d;
    # }

    # ─── Archive files (PDFs, images) ───
    location /archive/ {
        alias /var/www/paper-lib/archive/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ─── API proxy ───
    location /api/ {
        proxy_pass http://paper_lib_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running operations (metadata extraction, PDF conversion)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # File upload size (for PDF uploads)
        client_max_body_size 200M;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ─── Admin panel ───
    location = /admin {
        try_files /admin.html =404;
    }

    location = /admin/ {
        try_files /admin.html =404;
    }

    # ─── Embed page ───
    location = /embed.html {
        try_files /embed.html =404;
    }

    # ─── Main entry point ───
    location = / {
        try_files /index.html =404;
    }

    # ─── Fallback: serve static files ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Deny access to hidden files ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
